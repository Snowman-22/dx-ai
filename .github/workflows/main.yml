name: Deploy FastAPI to EC2
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build and Save Docker Image
        run: |
          docker build -t fastapi_snowman_image .
          docker save fastapi_snowman_image | gzip -1 > fastapi_snowman.tar.gz
          ls -lh fastapi_snowman.tar.gz

      - name: Clean up old files on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -f /home/${{ secrets.EC2_USERNAME }}/fastapi_snowman.tar.gz
            docker system prune -f

      - name: Copy Docker image to EC2 (native scp)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | sed 's/\r$//' > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -v -i ~/.ssh/ec2_deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=120 \
            fastapi_snowman.tar.gz "${EC2_USERNAME}@${EC2_HOST}:/home/${EC2_USERNAME}/"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            docker stop fastapi_snowman || true
            docker rm fastapi_snowman || true
            gunzip -c /home/${{ secrets.EC2_USERNAME }}/fastapi_snowman.tar.gz | docker load
            docker run -d -p 8000:8000 \
              -v /data/recommendation_algorithm:/data/recommendation_algorithm \
              --name fastapi_snowman \
              fastapi_snowman_image
            rm -f /home/${{ secrets.EC2_USERNAME }}/fastapi_snowman.tar.gz
