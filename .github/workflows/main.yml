name: Deploy FastAPI to EC2 (With .env)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build and Save Docker Image
        run: |
          docker build -t fastapi_snowman_image .
          docker save fastapi_snowman_image > fastapi_snowman.tar

      - name: Copy Docker image to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "fastapi_snowman.tar"
          target: "/home/${{ secrets.EC2_USERNAME }}"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stop fastapi_snowman || true
            docker rm fastapi_snowman || true
            docker load < /home/${{ secrets.EC2_USERNAME }}/fastapi_snowman.tar
            docker run -d -p 8000:8000 \
              -v /data/recommendation_algorithm:/data/recommendation_algorithm \
              --name fastapi_snowman \
              fastapi_snowman_image