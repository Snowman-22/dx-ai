name: Deploy FastAPI to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          printf '%s\n' "${{ secrets.ENV_FILE }}" > .env

      - name: Build Docker image
        run: |
          docker build --no-cache -t fastapi_snowman_image:${{ github.sha }} .
          docker tag fastapi_snowman_image:${{ github.sha }} fastapi_snowman_image:latest

      - name: Copy env file to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | sed 's/\r$//' > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/ec2_deploy_key \
            -o StrictHostKeyChecking=accept-new \
            .env "${EC2_USERNAME}@${EC2_HOST}:/home/${EC2_USERNAME}/fastapi_snowman.env"

      - name: Stream Docker image to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | sed 's/\r$//' > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          docker save fastapi_snowman_image:${{ github.sha }} | gzip -1 | \
            ssh -i ~/.ssh/ec2_deploy_key \
              -o StrictHostKeyChecking=accept-new \
              "${EC2_USERNAME}@${EC2_HOST}" 'gunzip -c | docker load'

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e

            docker stop fastapi_snowman || true
            docker rm fastapi_snowman || true
            docker rmi fastapi_snowman_image:latest || true

            docker run -d \
              --name fastapi_snowman \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /home/${{ secrets.EC2_USERNAME }}/fastapi_snowman.env \
              -e RECOMMENDATION_ALGORITHM_PATH=/data/recommendation_algorithm \
              -v /data/recommendation_algorithm:/data/recommendation_algorithm:ro \
              fastapi_snowman_image:${{ github.sha }}

            sleep 5
            docker ps
            docker exec fastapi_snowman env | grep RECOMMENDATION || true
            docker logs --tail 100 fastapi_snowman || true
            curl -s http://127.0.0.1:8000/health || true
            rm -f /home/${{ secrets.EC2_USERNAME }}/fastapi_snowman.env
